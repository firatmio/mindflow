<!doctype html>
<html lang="tr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>MindFlow Zen Modu</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" href="./css/style.css" />
	<link rel="stylesheet" href="./css/zen.css" />
</head>
<body class="zen-page">
	<div class="zen-shell">
		<header class="zen-topbar">
			<a href="/app" class="logo">Mind<span>Flow</span></a>
			<div class="zen-actions">
				<label class="zen-switch">
					<input type="checkbox" id="zen-sound" checked />
					<span>Ses</span>
				</label>
				<button class="ghost-button" id="zen-exit" type="button"><i class="fa-solid fa-arrow-left"></i> Geri Dön</button>
			</div>
		</header>

		<main class="zen-main">
			<p class="section-tag mb-3">Zen Modu</p>
			<h1 class="zen-title">Arayüzü bırak, sadece nefese dön.</h1>
			<p class="zen-copy" id="zen-quote">Yükleniyor...</p>

			<div class="breath-orb-wrap">
				<div class="breath-orb" id="breath-circle">
					<span id="breath-phase">Hazır</span>
				</div>
			</div>

			<p class="zen-hint" id="breath-hint">Başlat tuşuna bas ve ritmi takip et.</p>
			<p class="zen-status" id="zen-status">Zen modu hazır</p>

			<div class="zen-controls">
				<button class="cta-button cta-large" id="zen-toggle" type="button">Başlat</button>
			</div>
		</main>
	</div>

	<script type="module" src="./js/zen.js"></script>
</body>
</html>
